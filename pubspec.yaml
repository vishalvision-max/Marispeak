# Generate android & ios launcher icon settings
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/maris/marispeak_logo.png"
  min_sdk_android: 24
  adaptive_icon_background: "#12B5E9"
  adaptive_icon_foreground: "assets/icons/splashlogo.png"

# Generate splash logo settings
flutter_native_splash:
  color: "#12B5E9"
  image: "assets/icons/splashlogo.png"
  android: true
  ios: true
  ios_content_mode: center
  android_gravity: center
  android_12:
    image: "assets/icons/splashlogo.png"
    icon_background_color: "#12B5E9"
    icon_background_color_dark: "#12B5E9"
    android_gravity: center


